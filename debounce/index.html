<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search with Debouncing</title>
  </head>
  <body>
    <input type="text" oninput="debouncedProcessChange()" />

    <script>

        let data = [];

        function debounce(func,delay){
            let timerId;
            return function(){
                clearTimeout(timerId);
                timerId = setTimeout(()=>{
                    func()
                },delay)
            }
        }

        function processChange() {
            fetch('https://jsonplaceholder.typicode.com/posts')
            .then(response => response.json())
            .then(data => {
                console.log(data);
                // Here you can update the UI with the fetched data
            })
            .catch(error => {
                console.error('Error fetching data:', error);
            });
        }

        const debouncedProcessChange = debounce(processChange, 1000);
    </script>
  </body>
</html>
